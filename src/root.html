<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Temp/Humidity Monitor</title>
  <style>
    :root {
      color-scheme: light;
      font-family: monospace;
    }
    body {
      margin: 0;
      padding: 16px;
      background: #f2f2f2;
      color: #111;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
    }
    section {
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid #bbb;
      background: #fff;
    }
    h1, h2, h3, p {
      margin-top: 0;
    }
    .graph-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .graph-panel {
      margin: 0;
      padding: 12px;
      border: 1px solid #ccc;
      background: #fcfcfc;
    }
    @media (max-width: 900px) {
      .graph-grid {
        grid-template-columns: 1fr;
      }
    }
    .graph-panel h3 {
      margin-bottom: 6px;
    }
    .graph {
      width: 100%;
      height: 260px;
      border: 1px solid #bbb;
      background: #fafafa;
    }
    .value {
      display: inline-block;
      min-width: 10ch;
    }
    .hint {
      color: #555;
    }
    .subtitle {
      margin-top: -2px;
      color: #555;
      min-height: 2.4em;
    }
    code {
      background: #eee;
      padding: 0 4px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h2>Current</h2>
      <p>
        <span class="value">Temp: <strong id="temperature">--</strong> C</span>
        <span class="value">Humidity: <strong id="humidity">--</strong> %</span>
        <span class="value">Samples: <strong id="samples">--</strong></span>
      </p>
    </section>
    <section>
      <h2>History</h2>
      <p class="hint" id="graph-status">Loading history...</p>
      <div class="graph-grid">
        <article class="graph-panel">
          <h3>Last 5 Minutes</h3>
          <p class="subtitle" id="summary-five-minutes">Avg --  -- @ --</p>
          <canvas class="graph" id="graph-five-minutes" width="520" height="260"></canvas>
        </article>
        <article class="graph-panel">
          <h3>Last Hour</h3>
          <p class="subtitle" id="summary-hour">Avg --  -- @ --</p>
          <canvas class="graph" id="graph-hour" width="520" height="260"></canvas>
        </article>
        <article class="graph-panel">
          <h3>Last Day</h3>
          <p class="subtitle" id="summary-day">Avg --  -- @ --</p>
          <canvas class="graph" id="graph-day" width="520" height="260"></canvas>
        </article>
        <article class="graph-panel">
          <h3>Last Week</h3>
          <p class="subtitle" id="summary-week">Avg --  -- @ --</p>
          <canvas class="graph" id="graph-week" width="520" height="260"></canvas>
        </article>
        <article class="graph-panel">
          <h3>Last Month</h3>
          <p class="subtitle" id="summary-month">Avg --  -- @ --</p>
          <canvas class="graph" id="graph-month" width="520" height="260"></canvas>
        </article>
        <article class="graph-panel">
          <h3>All History</h3>
          <p class="subtitle" id="summary-all">Avg --  -- @ --</p>
          <canvas class="graph" id="graph-all" width="520" height="260"></canvas>
        </article>
      </div>
    </section>
  </main>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const graphConfigs = [
      {
        key: 'five-minutes',
        canvasId: 'graph-five-minutes',
        summaryId: 'summary-five-minutes',
        windowSeconds: 5 * 60,
        boundaryUnit: null,
      },
      {
        key: 'hour',
        canvasId: 'graph-hour',
        summaryId: 'summary-hour',
        windowSeconds: 60 * 60,
        boundaryUnit: 'five-minute',
      },
      {
        key: 'day',
        canvasId: 'graph-day',
        summaryId: 'summary-day',
        windowSeconds: 24 * 60 * 60,
        boundaryUnit: 'hour',
      },
      {
        key: 'week',
        canvasId: 'graph-week',
        summaryId: 'summary-week',
        windowSeconds: 7 * 24 * 60 * 60,
        boundaryUnit: 'day',
      },
      {
        key: 'month',
        canvasId: 'graph-month',
        summaryId: 'summary-month',
        windowSeconds: 30 * 24 * 60 * 60,
        boundaryUnit: 'week',
      },
      {
        key: 'all',
        canvasId: 'graph-all',
        summaryId: 'summary-all',
        windowSeconds: null,
        boundaryUnit: null,
      }
    ];
    const graphStates = {};
    let historyEntries = [];

    graphConfigs.forEach((config) => {
      graphStates[config.key] = {
        hoverIndex: -1,
        hoverMouseX: 0,
        hoverMouseY: 0,
      };
    });

    function normalizeApiBase(value) {
      if (typeof value !== 'string') {
        return '';
      }

      const trimmed = value.trim();
      if (trimmed === '') {
        return '';
      }

      return trimmed.replace(/\/+$/, '');
    }

    function getApiBase() {
      const override = normalizeApiBase(urlParams.get('apiBase'));
      if (override !== '') {
        try {
          window.localStorage.setItem('esp8266-temp-monitor-api-base', override);
        } catch (error) {
        }
        return override;
      }

      if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
        return '';
      }

      try {
        const stored = normalizeApiBase(window.localStorage.getItem('esp8266-temp-monitor-api-base'));
        if (stored !== '') {
          return stored;
        }
      } catch (error) {
      }

      return '';
    }

    const apiBase = getApiBase();

    function apiUrl(path) {
      return apiBase === '' ? path : apiBase + path;
    }

    async function fetchText(path) {
      const response = await fetch(apiUrl(path), {cache: 'no-store'});
      if (!response.ok) {
        throw new Error(path + ' => ' + response.status);
      }
      return response.text();
    }

    function normalizeEntries(entries) {
      const ordered = entries
        .slice()
        .sort((left, right) => left.timestamp - right.timestamp);
      const normalized = [];

      ordered.forEach((entry) => {
        const lastEntry = normalized[normalized.length - 1];
        if (lastEntry && lastEntry.timestamp === entry.timestamp) {
          normalized[normalized.length - 1] = entry;
        } else {
          normalized.push(entry);
        }
      });

      return normalized;
    }

    function parseRows(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      const entries = lines.map((line) => {
        const parts = line.split(',');
        return {
          timestamp: Number(parts[0]),
          temperature: Number(parts[1]),
          humidity: Number(parts[2]),
        };
      }).filter((entry) =>
        Number.isFinite(entry.timestamp) &&
        Number.isFinite(entry.temperature) &&
        Number.isFinite(entry.humidity)
      );

      return normalizeEntries(entries);
    }

    function clamp(value, minValue, maxValue) {
      return Math.max(minValue, Math.min(maxValue, value));
    }

    function getEntryAxisMs(entry) {
      return entry && Number.isFinite(entry.timestamp) ? entry.timestamp * 1000 : NaN;
    }

    function formatWallClockMs(wallClockMs) {
      const date = new Date(wallClockMs);
      return (
        String(date.getFullYear()) +
        '-' +
        String(date.getMonth() + 1).padStart(2, '0') +
        '-' +
        String(date.getDate()).padStart(2, '0') +
        ' ' +
        String(date.getHours()).padStart(2, '0') +
        ':' +
        String(date.getMinutes()).padStart(2, '0') +
        ':' +
        String(date.getSeconds()).padStart(2, '0')
      );
    }

    function formatGraphTimestamp(entry) {
      return entry && Number.isFinite(entry.timestamp) ? formatWallClockMs(entry.timestamp * 1000) : '--';
    }

    function nextBoundaryAfter(boundaryUnit, wallClockMs) {
      const date = new Date(wallClockMs);

      if (boundaryUnit === 'five-minute') {
        date.setSeconds(0, 0);
        date.setMinutes(Math.floor(date.getMinutes() / 5) * 5);
        date.setMinutes(date.getMinutes() + 5);
        return date.getTime();
      }

      if (boundaryUnit === 'hour') {
        date.setMinutes(0, 0, 0);
        date.setHours(date.getHours() + 1);
        return date.getTime();
      }

      if (boundaryUnit === 'day') {
        date.setHours(0, 0, 0, 0);
        date.setDate(date.getDate() + 1);
        return date.getTime();
      }

      if (boundaryUnit === 'week') {
        date.setHours(0, 0, 0, 0);
        const day = date.getDay();
        const daysUntilMonday = day === 0 ? 1 : 8 - day;
        date.setDate(date.getDate() + daysUntilMonday);
        return date.getTime();
      }

      return NaN;
    }

    function advanceBoundary(boundaryUnit, wallClockMs) {
      const date = new Date(wallClockMs);

      if (boundaryUnit === 'five-minute') {
        date.setMinutes(date.getMinutes() + 5);
        return date.getTime();
      }

      if (boundaryUnit === 'hour') {
        date.setHours(date.getHours() + 1);
        return date.getTime();
      }

      if (boundaryUnit === 'day') {
        date.setDate(date.getDate() + 1);
        return date.getTime();
      }

      if (boundaryUnit === 'week') {
        date.setDate(date.getDate() + 7);
        return date.getTime();
      }

      return NaN;
    }

    function upsertEntry(entry) {
      let left = 0;
      let right = historyEntries.length;

      while (left < right) {
        const middle = (left + right) >> 1;
        if (historyEntries[middle].timestamp < entry.timestamp) {
          left = middle + 1;
        } else {
          right = middle;
        }
      }

      if (left < historyEntries.length && historyEntries[left].timestamp === entry.timestamp) {
        historyEntries[left] = entry;
      } else {
        historyEntries.splice(left, 0, entry);
      }
    }

    function entriesForWindow(windowSeconds) {
      if (windowSeconds == null) {
        return historyEntries.slice();
      }

      const anchorAxisMs = getEntryAxisMs(historyEntries[historyEntries.length - 1]);
      if (!Number.isFinite(anchorAxisMs)) {
        return [];
      }

      const earliestAxisMs = anchorAxisMs - windowSeconds * 1000;
      return historyEntries.filter((entry) => getEntryAxisMs(entry) >= earliestAxisMs);
    }

    function formatSummary(entries) {
      if (entries.length === 0) {
        return 'No samples in this range yet.';
      }

      let sumTemperature = 0;
      let sumHumidity = 0;

      entries.forEach((entry) => {
        sumTemperature += entry.temperature;
        sumHumidity += entry.humidity;
      });

      return (
        'Avg ' + (sumTemperature / entries.length).toFixed(2) + ' C / ' + (sumHumidity / entries.length).toFixed(2) + ' % @ ' + entries.length
      );
    }

    function drawEmptyGraph(canvas, message) {
      const ctx = prepareCanvasContext(canvas);
      const width = canvas.clientWidth || canvas.width;
      const height = canvas.clientHeight || canvas.height;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#fafafa';
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = '#ddd';
      ctx.strokeRect(0, 0, width, height);
      ctx.fillStyle = '#555';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '14px monospace';
      ctx.fillText(message, width / 2, height / 2);
    }

    function prepareCanvasContext(canvas) {
      const cssWidth = canvas.clientWidth || canvas.width;
      const cssHeight = canvas.clientHeight || canvas.height;
      const devicePixelRatio = window.devicePixelRatio || 1;
      const displayWidth = Math.max(1, Math.round(cssWidth * devicePixelRatio));
      const displayHeight = Math.max(1, Math.round(cssHeight * devicePixelRatio));

      if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
        canvas.width = displayWidth;
        canvas.height = displayHeight;
      }

      const ctx = canvas.getContext('2d');
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      return ctx;
    }

    function drawGraph(config, entries) {
      const canvas = document.getElementById(config.canvasId);
      const ctx = prepareCanvasContext(canvas);
      const width = canvas.clientWidth || canvas.width;
      const height = canvas.clientHeight || canvas.height;
      const marginLeft = 52;
      const marginRight = 52;
      const marginTop = 20;
      const marginBottom = 34;
      const state = graphStates[config.key];

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#fafafa';
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = '#ddd';
      ctx.strokeRect(0, 0, width, height);

      if (entries.length < 2) {
        drawEmptyGraph(canvas, 'Not enough samples for a graph yet.');
        return;
      }

      let minTemperature = Infinity;
      let maxTemperature = -Infinity;
      let minHumidity = Infinity;
      let maxHumidity = -Infinity;
      entries.forEach((entry) => {
        minTemperature = Math.min(minTemperature, entry.temperature);
        maxTemperature = Math.max(maxTemperature, entry.temperature);
        minHumidity = Math.min(minHumidity, entry.humidity);
        maxHumidity = Math.max(maxHumidity, entry.humidity);
      });

      if (minTemperature === maxTemperature) {
        minTemperature -= 1;
        maxTemperature += 1;
      }
      if (minHumidity === maxHumidity) {
        minHumidity -= 1;
        maxHumidity += 1;
      }

      const firstTime = getEntryAxisMs(entries[0]);
      const lastTime = getEntryAxisMs(entries[entries.length - 1]);
      const timeSpan = Math.max(1, lastTime - firstTime);
      const temperatureSpan = maxTemperature - minTemperature;
      const humiditySpan = maxHumidity - minHumidity;

      function xFor(entry) {
        return marginLeft + (getEntryAxisMs(entry) - firstTime) * (width - marginLeft - marginRight) / timeSpan;
      }

      function yForTemperature(value) {
        return height - marginBottom - (value - minTemperature) * (height - marginTop - marginBottom) / temperatureSpan;
      }

      function yForHumidity(value) {
        return height - marginBottom - (value - minHumidity) * (height - marginTop - marginBottom) / humiditySpan;
      }

      ctx.strokeStyle = '#bbb';
      ctx.beginPath();
      ctx.moveTo(marginLeft, marginTop);
      ctx.lineTo(marginLeft, height - marginBottom);
      ctx.lineTo(width - marginRight, height - marginBottom);
      ctx.moveTo(width - marginRight, marginTop);
      ctx.lineTo(width - marginRight, height - marginBottom);
      ctx.stroke();

      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.font = '12px monospace';
      ctx.fillStyle = '#c62828';
      ctx.fillText(minTemperature.toFixed(1), 4, height - marginBottom + 12);
      ctx.fillText(maxTemperature.toFixed(1), 4, marginTop + 4);
      ctx.fillStyle = '#1565c0';
      ctx.textAlign = 'right';
      ctx.fillText(minHumidity.toFixed(1), width - 4, height - marginBottom + 12);
      ctx.fillText(maxHumidity.toFixed(1), width - 4, marginTop + 4);
      ctx.fillStyle = '#444';
      ctx.textAlign = 'left';
      ctx.fillText(formatGraphTimestamp(entries[0]), marginLeft, height - 8);
      ctx.textAlign = 'right';
      ctx.fillText(formatGraphTimestamp(entries[entries.length - 1]), width - marginRight, height - 8);

      if (config.boundaryUnit) {
        let boundaryMs = nextBoundaryAfter(config.boundaryUnit, firstTime);

        ctx.save();
        ctx.setLineDash([2, 4]);
        ctx.strokeStyle = '#d0d0d0';
        while (Number.isFinite(boundaryMs) && boundaryMs < lastTime) {
          const boundaryX = marginLeft + (boundaryMs - firstTime) * (width - marginLeft - marginRight) / timeSpan;
          ctx.beginPath();
          ctx.moveTo(boundaryX, marginTop);
          ctx.lineTo(boundaryX, height - marginBottom);
          ctx.stroke();
          boundaryMs = advanceBoundary(config.boundaryUnit, boundaryMs);
        }
        ctx.restore();
      }

      ctx.strokeStyle = '#c62828';
      ctx.beginPath();
      entries.forEach((entry, index) => {
        const x = xFor(entry);
        const y = yForTemperature(entry.temperature);
        if (index === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();

      ctx.strokeStyle = '#1565c0';
      ctx.beginPath();
      entries.forEach((entry, index) => {
        const x = xFor(entry);
        const y = yForHumidity(entry.humidity);
        if (index === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();

      if (state.hoverIndex >= 0 && state.hoverIndex < entries.length) {
        const hoveredEntry = entries[state.hoverIndex];
        const hoverX = xFor(hoveredEntry);
        const hoverTempY = yForTemperature(hoveredEntry.temperature);
        const hoverHumidY = yForHumidity(hoveredEntry.humidity);
        const tooltipLines = [
          formatGraphTimestamp(hoveredEntry),
          'T ' + hoveredEntry.temperature.toFixed(2) + ' C',
          'H ' + hoveredEntry.humidity.toFixed(2) + ' %'
        ];
        const tooltipPadding = 6;
        const tooltipLineHeight = 14;
        let tooltipWidth = 0;

        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#666';
        ctx.beginPath();
        ctx.moveTo(hoverX, marginTop);
        ctx.lineTo(hoverX, height - marginBottom);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = '#c62828';
        ctx.beginPath();
        ctx.arc(hoverX, hoverTempY, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#1565c0';
        ctx.beginPath();
        ctx.arc(hoverX, hoverHumidY, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.font = '12px monospace';
        ctx.textAlign = 'left';
        tooltipLines.forEach((line) => {
          tooltipWidth = Math.max(tooltipWidth, ctx.measureText(line).width);
        });

        const tooltipHeight = tooltipPadding * 2 + tooltipLineHeight * tooltipLines.length;
        const tooltipX = clamp(state.hoverMouseX + 12, 4, width - tooltipWidth - tooltipPadding * 2 - 4);
        const tooltipY = clamp(state.hoverMouseY - tooltipHeight - 12, 4, height - tooltipHeight - 4);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.82)';
        ctx.fillRect(tooltipX, tooltipY, tooltipWidth + tooltipPadding * 2, tooltipHeight);
        ctx.strokeStyle = 'rgba(80, 80, 80, 0.6)';
        ctx.strokeRect(tooltipX, tooltipY, tooltipWidth + tooltipPadding * 2, tooltipHeight);
        ctx.fillStyle = '#222';
        tooltipLines.forEach((line, index) => {
          ctx.fillText(line, tooltipX + tooltipPadding, tooltipY + tooltipPadding + 11 + index * tooltipLineHeight);
        });
      }
    }

    function drawAllGraphs() {
      graphConfigs.forEach((config) => {
        const entries = entriesForWindow(config.windowSeconds);
        document.getElementById(config.summaryId).textContent = formatSummary(entries);
        drawGraph(config, entries);
      });
    }

    function updateHoverFromMouse(config, event) {
      const canvas = document.getElementById(config.canvasId);
      const rect = canvas.getBoundingClientRect();
      const mouseX = (event.clientX - rect.left) * canvas.width / rect.width;
      const mouseY = (event.clientY - rect.top) * canvas.height / rect.height;
      const entries = entriesForWindow(config.windowSeconds);
      const state = graphStates[config.key];
      const marginLeft = 52;
      const marginRight = 52;
      const marginTop = 20;
      const marginBottom = 34;

      state.hoverMouseX = mouseX;
      state.hoverMouseY = mouseY;

      if (
        entries.length < 2 ||
        mouseX < marginLeft ||
        mouseX > canvas.width - marginRight ||
        mouseY < marginTop ||
        mouseY > canvas.height - marginBottom
      ) {
        state.hoverIndex = -1;
        drawGraph(config, entries);
        return;
      }

      const firstTime = getEntryAxisMs(entries[0]);
      const lastTime = getEntryAxisMs(entries[entries.length - 1]);
      const timeSpan = Math.max(1, lastTime - firstTime);
      let bestIndex = 0;
      let bestDistance = Infinity;

      entries.forEach((entry, index) => {
        const x = marginLeft + (getEntryAxisMs(entry) - firstTime) * (canvas.width - marginLeft - marginRight) / timeSpan;
        const distance = Math.abs(x - mouseX);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = index;
        }
      });

      state.hoverIndex = bestIndex;
      drawGraph(config, entries);
    }

    function initializeGraphInteraction() {
      graphConfigs.forEach((config) => {
        const canvas = document.getElementById(config.canvasId);
        const state = graphStates[config.key];

        canvas.addEventListener('mousemove', (event) => {
          updateHoverFromMouse(config, event);
        });
        canvas.addEventListener('mouseleave', () => {
          state.hoverIndex = -1;
          drawGraph(config, entriesForWindow(config.windowSeconds));
        });
      });
    }

    async function refreshCurrent() {
      const entries = parseRows(await fetchText('/raw'));
      if (entries.length === 0) {
        throw new Error('No current data');
      }

      const currentEntry = entries[0];
      upsertEntry(currentEntry);

      document.getElementById('temperature').textContent = currentEntry.temperature.toFixed(1);
      document.getElementById('humidity').textContent = currentEntry.humidity.toFixed(1);
      document.getElementById('samples').textContent = String(historyEntries.length);
      document.getElementById('graph-status').textContent = 'Red = temperature (C) uses the left axis, blue = humidity (%) uses the right axis';
      drawAllGraphs();
    }

    async function refreshHistory() {
      historyEntries = parseRows(await fetchText('/history'));
      if (historyEntries.length > 0) {
        const entry = historyEntries[historyEntries.length - 1];
        document.getElementById('temperature').textContent = entry.temperature.toFixed(1);
        document.getElementById('humidity').textContent = entry.humidity.toFixed(1);
        document.getElementById('graph-status').textContent = 'History loaded';
      }
      document.getElementById('samples').textContent = String(historyEntries.length);
      drawAllGraphs();
    }

    async function initializePage() {
      try {
        await refreshHistory();
        await refreshCurrent();
      } catch (error) {
        document.getElementById('graph-status').textContent = String(error);
      }
    }

    initializeGraphInteraction();
    initializePage();
    window.addEventListener('resize', () => {
      drawAllGraphs();
    });
    setInterval(() => {
      refreshCurrent().catch((error) => {
        document.getElementById('graph-status').textContent = String(error);
      });
    }, 2000);
  </script>
</body>
</html>
